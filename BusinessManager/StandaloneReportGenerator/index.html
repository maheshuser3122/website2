<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Generator - Upload & Export to PPT</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.umd.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { background: white; padding: 30px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2); }
        .header h1 { color: #333; margin-bottom: 10px; font-size: 32px; }
        .header p { color: #666; font-size: 16px; }
        .content { display: grid; grid-template-columns: 300px 1fr; gap: 20px; }
        .sidebar { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2); height: fit-content; }
        .button { width: 100%; padding: 12px; margin: 10px 0; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.3s; }
        .button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4); }
        .button.secondary { background: #e5e7eb; color: #333; }
        .button.secondary:hover { background: #d1d5db; }
        .status { margin: 15px 0; padding: 12px; border-radius: 8px; display: none; font-size: 14px; }
        .status.success { background: #dcfce7; color: #166534; border: 1px solid #86efac; display: block; }
        .status.error { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; display: block; }
        .status.loading { background: #e0e7ff; color: #667eea; border: 1px solid #c7d2fe; display: block; }
        .main { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2); display: none; }
        .main.active { display: block; }
        .main h2 { color: #333; margin-bottom: 20px; font-size: 28px; border-bottom: 3px solid #667eea; padding-bottom: 15px; }
        .kpi-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin: 20px 0; }
        .kpi-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 10px; text-align: center; }
        .kpi-label { font-size: 12px; opacity: 0.9; text-transform: uppercase; margin-bottom: 10px; }
        .kpi-value { font-size: 32px; font-weight: bold; }
        .charts { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; margin: 30px 0; }
        .chart-box { background: #f8f9ff; padding: 20px; border-radius: 10px; }
        .chart-title { font-weight: bold; margin-bottom: 15px; color: #333; }
        .chart-canvas { position: relative; height: 300px; margin-bottom: 10px; }
        .data-table { width: 100%; margin: 20px 0; border-collapse: collapse; }
        .data-table th { background: #667eea; color: white; padding: 12px; text-align: left; }
        .data-table td { padding: 10px 12px; border-bottom: 1px solid #e5e7eb; }
        .data-table tr:hover { background: #f8f9ff; }
        .download-section { background: #e0e7ff; padding: 20px; border-radius: 10px; text-align: center; margin: 30px 0; }
        .download-btn { background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%); color: white; border: none; padding: 15px 40px; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 600; margin: 10px; transition: all 0.3s; }
        .download-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(34, 197, 94, 0.4); }
        @media (max-width: 900px) { .content { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Report Generator</h1>
            <p>Upload Excel data → Generate Report → Download as PowerPoint</p>
        </div>
        
        <div class="content">
            <!-- Sidebar -->
            <div class="sidebar">
                <h3 style="color: #333; margin-bottom: 15px;">📁 Actions</h3>
                <button class="button" onclick="document.getElementById('fileInput').click();">📂 Browse File</button>
                <button class="button secondary" onclick="btnLoadSample()">📋 Load Sample</button>
                <button class="button secondary" onclick="btnClear()" style="display: none; background: #f87171; color: white;" id="btnClear">🔄 Clear</button>
                <div class="status" id="status"></div>
                <input type="file" id="fileInput" accept=".xlsx,.xls" style="display: none;" onchange="handleFileUpload(event)">
            </div>
            
            <!-- Main Content -->
            <div class="main" id="mainContent">
                <div id="reportHTML"></div>
            </div>
        </div>
    </div>

    <script>
        let currentData = null;
        
        function showMsg(msg, type) {
            const el = document.getElementById('status');
            el.textContent = msg;
            el.className = 'status ' + type;
        }
        
        function handleFileUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            showMsg('⏳ Reading file...', 'loading');
            const reader = new FileReader();
            reader.onload = function(event) {
                try {
                    const data = new Uint8Array(event.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    currentData = { sheets: {} };
                    workbook.SheetNames.forEach(name => {
                        currentData.sheets[name] = XLSX.utils.sheet_to_json(workbook.Sheets[name]);
                    });
                    showMsg('✅ File loaded!', 'success');
                    renderReport();
                    document.getElementById('btnClear').style.display = 'block';
                } catch (err) {
                    showMsg('❌ Error: ' + err.message, 'error');
                }
            };
            reader.readAsArrayBuffer(file);
        }
        
        function btnLoadSample() {
            console.log('Load sample clicked');
            currentData = {
                sheets: {
                    'KPIs': [
                        { KPI: 'Network Availability', Value: 99.5, Target: 99.9, Status: 'On Track' },
                        { KPI: 'Cost Per Incident', Value: 2500, Target: 2000, Status: 'Review' },
                        { KPI: 'Mean Time To Recover', Value: 15, Target: 20, Status: 'Good' },
                        { KPI: 'Incidents Per Month', Value: 8, Target: 5, Status: 'Monitor' }
                    ],
                    'Performance': [
                        { Metric: 'Uptime', Q1: 99.5, Q2: 99.8, Q3: 99.2, Q4: 99.9 },
                        { Metric: 'Response Time', Q1: 245, Q2: 198, Q3: 212, Q4: 165 },
                        { Metric: 'Error Rate', Q1: 0.5, Q2: 0.3, Q3: 0.4, Q4: 0.2 }
                    ],
                    'Vendors': [
                        { Vendor: 'Cisco', Market_Share: 35, Status: 'Active', Score: 92 },
                        { Vendor: 'Juniper', Market_Share: 28, Status: 'Active', Score: 85 },
                        { Vendor: 'Arista', Market_Share: 22, Status: 'Active', Score: 88 },
                        { Vendor: 'Others', Market_Share: 15, Status: 'Support', Score: 70 }
                    ]
                }
            };
            console.log('Data set:', currentData);
            showMsg('✅ Sample data loaded!', 'success');
            renderReport();
            document.getElementById('btnClear').style.display = 'block';
        }
        
        function renderReport() {
            console.log('Rendering report...');
            if (!currentData) {
                showMsg('❌ No data', 'error');
                return;
            }
            
            const report = document.getElementById('reportHTML');
            let html = '';
            
            // KPI Cards
            const kpis = currentData.sheets['KPIs'] || [];
            if (kpis.length > 0) {
                html += '<div class="kpi-cards">';
                kpis.forEach(kpi => {
                    html += `<div class="kpi-card"><div class="kpi-label">${kpi.KPI}</div><div class="kpi-value">${kpi.Value}</div><div style="font-size:11px;opacity:0.8;">Target: ${kpi.Target}</div></div>`;
                });
                html += '</div>';
            }
            
            // Charts
            html += '<div class="charts">';
            html += '<div class="chart-box"><div class="chart-title">📊 Vendor Market Share</div><div class="chart-canvas"><canvas id="pieChart"></canvas></div></div>';
            html += '<div class="chart-box"><div class="chart-title">📈 Performance Trends</div><div class="chart-canvas"><canvas id="lineChart"></canvas></div></div>';
            html += '<div class="chart-box"><div class="chart-title">📊 KPI vs Target</div><div class="chart-canvas"><canvas id="barChart"></canvas></div></div>';
            html += '</div>';
            
            // Data Tables
            html += '<h3 style="margin-top: 30px; color: #333;">📋 Detailed Data</h3>';
            Object.keys(currentData.sheets).forEach(sheet => {
                const data = currentData.sheets[sheet];
                if (data.length === 0) return;
                html += `<h4 style="color: #667eea; margin-top: 20px;">${sheet}</h4>`;
                html += '<table class="data-table"><thead><tr>';
                Object.keys(data[0]).forEach(col => {
                    html += `<th>${col}</th>`;
                });
                html += '</tr></thead><tbody>';
                data.forEach(row => {
                    html += '<tr>';
                    Object.keys(row).forEach(col => {
                        html += `<td>${row[col]}</td>`;
                    });
                    html += '</tr>';
                });
                html += '</tbody></table>';
            });
            
            // Download buttons
            html += '<div class="download-section">';
            html += '<button class="download-btn" onclick="downloadPPT()">📥 Download as PowerPoint</button>';
            html += '<button class="download-btn" style="background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);" onclick="downloadHTML()">💾 Download as HTML</button>';
            html += '</div>';
            
            report.innerHTML = html;
            document.getElementById('mainContent').classList.add('active');
            
            // Render charts
            setTimeout(renderCharts, 500);
        }
        
        function renderCharts() {
            console.log('Drawing charts...');
            const ctx1 = document.getElementById('pieChart');
            const ctx2 = document.getElementById('lineChart');
            const ctx3 = document.getElementById('barChart');
            
            if (!ctx1 || !ctx2 || !ctx3) {
                console.error('Canvas elements not found');
                return;
            }
            
            // Pie Chart
            const vendors = currentData.sheets['Vendors'] || [];
            if (vendors.length > 0 && typeof Chart !== 'undefined') {
                new Chart(ctx1, {
                    type: 'doughnut',
                    data: {
                        labels: vendors.map(v => v.Vendor),
                        datasets: [{
                            data: vendors.map(v => v.Market_Share),
                            backgroundColor: ['#667eea', '#764ba2', '#22c55e', '#ef4444']
                        }]
                    },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
                });
            }
            
            // Line Chart
            const perf = currentData.sheets['Performance'] || [];
            if (perf.length > 0 && typeof Chart !== 'undefined') {
                const quarters = Object.keys(perf[0]).filter(k => k.startsWith('Q'));
                new Chart(ctx2, {
                    type: 'line',
                    data: {
                        labels: quarters,
                        datasets: perf.map((m, idx) => ({
                            label: m.Metric,
                            data: quarters.map(q => m[q]),
                            borderColor: ['#667eea', '#764ba2', '#22c55e'][idx],
                            tension: 0.4
                        }))
                    },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
                });
            }
            
            // Bar Chart
            const kpis = currentData.sheets['KPIs'] || [];
            if (kpis.length > 0 && typeof Chart !== 'undefined') {
                new Chart(ctx3, {
                    type: 'bar',
                    data: {
                        labels: kpis.map(k => k.KPI),
                        datasets: [
                            { label: 'Actual', data: kpis.map(k => k.Value), backgroundColor: '#667eea' },
                            { label: 'Target', data: kpis.map(k => k.Target), backgroundColor: '#e5e7eb' }
                        ]
                    },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
                });
            }
        }
        
        function downloadPPT() {
            if (!currentData) {
                alert('No data to export');
                return;
            }
            const pres = new PptxGenJS();
            
            // Title slide
            let slide = pres.addSlide();
            slide.background = { color: '667eea' };
            slide.addText('Report Generator', { x: 0.5, y: 2, w: 9, h: 1, fontSize: 44, bold: true, color: 'FFFFFF' });
            
            // Data slides
            Object.keys(currentData.sheets).forEach(sheet => {
                const data = currentData.sheets[sheet];
                if (data.length === 0) return;
                slide = pres.addSlide();
                slide.addText(sheet, { x: 0.5, y: 0.5, w: 9, h: 0.5, fontSize: 32, bold: true, color: '667eea' });
                const rows = data.slice(0, 10).map(row => Object.keys(row).map(k => String(row[k])));
                const cols = Object.keys(data[0]);
                slide.addTable([cols, ...rows], { x: 0.5, y: 1.2, w: 9, h: 4.5, border: { pt: 1, color: '667eea' }, fill: { color: 'F8F9FF' } });
            });
            
            pres.save({ fileName: 'Report-' + Date.now() + '.pptx' });
        }
        
        function downloadHTML() {
            if (!currentData) {
                alert('No data to export');
                return;
            }
            let html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Report</title><style>body{font-family:Arial;margin:20px;background:#f5f5f5}table{width:100%;border-collapse:collapse;margin:20px 0;background:white}th,td{border:1px solid #ddd;padding:10px;text-align:left}th{background:#667eea;color:white}.section{background:white;padding:20px;margin:20px 0;border-radius:8px}</style></head><body><h1>Report Export</h1>`;
            Object.keys(currentData.sheets).forEach(sheet => {
                const data = currentData.sheets[sheet];
                if (data.length === 0) return;
                html += `<div class="section"><h2>${sheet}</h2><table><tr>`;
                Object.keys(data[0]).forEach(col => {
                    html += `<th>${col}</th>`;
                });
                html += '</tr>';
                data.forEach(row => {
                    html += '<tr>';
                    Object.keys(row).forEach(col => {
                        html += `<td>${row[col]}</td>`;
                    });
                    html += '</tr>';
                });
                html += '</table></div>';
            });
            html += '</body></html>';
            const blob = new Blob([html], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'Report-' + Date.now() + '.html';
            a.click();
            URL.revokeObjectURL(url);
        }
        
        function btnClear() {
            currentData = null;
            document.getElementById('mainContent').classList.remove('active');
            document.getElementById('reportHTML').innerHTML = '';
            document.getElementById('btnClear').style.display = 'none';
            showMsg('', '');
        }
    </script>
</body>
</html>
