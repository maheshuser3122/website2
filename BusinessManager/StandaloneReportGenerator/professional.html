<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Report - Production Grade</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.11.0/dist/pptxgen.umd.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Calibri', 'Segoe UI', sans-serif; 
            background: #f0f0f0; 
            overflow: hidden;
        }
        
        .workspace {
            display: flex;
            height: 100vh;
        }
        
        .sidebar {
            width: 280px;
            background: #16213e;
            padding: 20px;
            border-right: 3px solid #0066cc;
            overflow-y: auto;
            color: white;
        }
        
        .sidebar h2 {
            font-size: 16px;
            margin-bottom: 20px;
            color: #0066cc;
            font-weight: bold;
        }
        
        .sidebar button {
            width: 100%;
            padding: 11px;
            margin: 8px 0;
            background: #0066cc;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s;
        }
        
        .sidebar button:hover {
            background: #0052a3;
        }
        
        .sidebar button.secondary {
            background: #444;
        }
        
        .sidebar button.secondary:hover {
            background: #555;
        }
        
        .status {
            margin: 15px 0;
            padding: 12px;
            border-radius: 4px;
            font-size: 12px;
            color: white;
            text-align: center;
            display: none;
        }
        
        .status.show { display: block; }
        .status.success { background: #28a745; }
        .status.error { background: #dc3545; }
        .status.loading { background: #ffc107; color: black; }
        
        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #1f1f1f;
        }
        
        .controls {
            background: #2d2d2d;
            padding: 12px 20px;
            border-bottom: 2px solid #0066cc;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .controls button {
            padding: 8px 16px;
            background: #0066cc;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            margin: 0 5px;
        }
        
        .controls button:hover {
            background: #0052a3;
        }
        
        .slide-counter {
            color: #999;
            font-size: 13px;
        }
        
        .slide-area {
            flex: 1;
            overflow: auto;
            padding: 20px;
            background: #1f1f1f;
        }
        
        .slide-wrapper {
            background: white;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            min-height: 600px;
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px;
            border-radius: 8px;
        }
        
        .slide-title {
            font-size: 32px;
            font-weight: bold;
            color: #1a1a1a;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 3px solid #0066cc;
        }
        
        .title-slide {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(135deg, #2c3e50 0%, #3d5a73 100%);
            color: white;
            min-height: 600px;
        }
        
        .title-slide h1 {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        
        .title-slide p {
            font-size: 24px;
            opacity: 0.9;
        }
        
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            font-size: 12px;
        }
        
        .data-table thead {
            background: #0066cc;
            color: white;
        }
        
        .data-table th {
            padding: 12px;
            text-align: left;
            font-weight: 600;
            border: 1px solid #0066cc;
        }
        
        .data-table td {
            padding: 10px;
            border: 1px solid #ddd;
        }
        
        .data-table tbody tr:hover {
            background: #f0f0f0;
        }
        
        .row-highlight-orange {
            background-color: #ffd99b;
        }
        
        .row-highlight-blue {
            background-color: #b3d9ff;
        }
        
        .row-highlight-green {
            background-color: #c2f0c2;
        }
        
        .chart-section {
            margin: 30px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        
        .chart-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
        }
        
        .chart-container {
            position: relative;
            height: 350px;
            margin: 20px 0;
        }
        
        .two-column {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin: 20px 0;
        }
        
        .kpi-box {
            background: linear-gradient(135deg, #0066cc 0%, #0052a3 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        
        .kpi-value {
            font-size: 36px;
            font-weight: bold;
            margin: 10px 0;
        }
        
        .kpi-label {
            font-size: 13px;
            opacity: 0.9;
        }
        
        .sidebar-indicator {
            position: absolute;
            right: 0;
            top: 0;
            width: 25px;
            height: 100%;
            background: linear-gradient(to bottom, #0066cc, #28a745, #ffc107, #dc3545);
            border-radius: 8px;
        }
        
        #fileInput {
            display: none;
        }
    </style>
</head>
<body>
    <div class="workspace">
        <!-- Sidebar -->
        <div class="sidebar">
            <h2>Report Generator</h2>
            <button onclick="document.getElementById('fileInput').click();">Upload Excel</button>
            <button class="secondary" onclick="generateProReport();">Generate Report</button>
            <button class="secondary" onclick="downloadPPT();" id="downloadBtn" style="display: none; background: #28a745;">Download PPT</button>
            <button class="secondary" onclick="location.reload();" id="clearBtn" style="display: none;">Refresh</button>
            <div class="status" id="status"></div>
            <input type="file" id="fileInput" accept=".xlsx,.xls" onchange="handleUpload(event)">
        </div>
        
        <!-- Main Area -->
        <div class="main-area">
            <div class="controls">
                <button onclick="prevSlide();">Previous</button>
                <span class="slide-counter"><span id="slideNum">0</span> / <span id="totalSlides">0</span></span>
                <button onclick="nextSlide();">Next</button>
            </div>
            <div class="slide-area" id="slideArea"></div>
        </div>
    </div>

    <script>
        let currentData = null;
        let allSlides = [];
        let currentSlideIndex = 0;
        
        function showStatus(msg, type = 'loading') {
            const el = document.getElementById('status');
            el.textContent = msg;
            el.className = 'status show ' + type;
            if (type === 'success') setTimeout(() => el.classList.remove('show'), 3000);
        }
        
        function handleUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            showStatus('Reading file...');
            const reader = new FileReader();
            reader.onload = function(event) {
                try {
                    const data = new Uint8Array(event.target.result);
                    const wb = XLSX.read(data, { type: 'array' });
                    currentData = { sheets: {} };
                    wb.SheetNames.forEach(name => {
                        currentData.sheets[name] = XLSX.utils.sheet_to_json(wb.Sheets[name]);
                    });
                    showStatus('File loaded! Generating report...', 'success');
                    generateProReport();
                } catch (err) {
                    showStatus('Error: ' + err.message, 'error');
                }
            };
            reader.readAsArrayBuffer(file);
        }
        
        function generateProReport() {
            if (!currentData && !loadSampleData()) {
                showStatus('No data available', 'error');
                return;
            }
            buildSlides();
            document.getElementById('downloadBtn').style.display = 'block';
            document.getElementById('clearBtn').style.display = 'block';
        }
        
        function loadSampleData() {
            currentData = {
                sheets: {
                    'RAID': [
                        { Item: '1. RAID', Status: 'Active', Impact: 'High', Owner: 'Team A' },
                        { Item: '2. Risk Assessment', Status: 'Pending', Impact: 'Medium', Owner: 'Team B' },
                        { Item: '3. Architecture Review', Status: 'Completed', Impact: 'High', Owner: 'Team A' }
                    ],
                    'ALM_KPIs': [
                        { 'Tested By': 'ENTS', CountTest: 3355, CountDefect: 75, Density: 2.1, Status: 'Pass' },
                        { 'Tested By': 'Unknown', CountTest: 5359, CountDefect: 87, Density: 1.6, Status: 'Review' },
                        { 'Tested By': 'Vendor', CountTest: 104, CountDefect: 0, Density: 0.0, Status: 'Pass' }
                    ],
                    'ALM_Details': [
                        { Project: 'GHED_ML_ORXN_SAMSUNG', Release: 'Samsung Q6M 2.3 Testing', TestCount: 68, DefectCount: 8 },
                        { Project: 'GHED_MCE_ACCCESS_LRANK', Release: 'MCE ORXN', TestCount: 45, DefectCount: 2 },
                        { Project: 'GHED_GDD_NDC', Release: 'GDD & NDC', TestCount: 23, DefectCount: 1 }
                    ],
                    'SR_Analysis': [
                        { ServiceDomain: 'Assn', VF_UK: 31, VF_IT: 0 },
                        { ServiceDomain: 'Broadside', VF_UK: 6, VF_IT: 87 },
                        { ServiceDomain: 'Cyber-Hygiene', VF_UK: 20, VF_IT: 0 }
                    ],
                    'Performance': [
                        { Month: 'January', Uptime: 99.2, Response: 250, Defects: 12 },
                        { Month: 'February', Uptime: 99.5, Response: 220, Defects: 8 },
                        { Month: 'March', Uptime: 99.8, Response: 198, Defects: 5 }
                    ]
                }
            };
            return true;
        }
        
        function buildSlides() {
            allSlides = [];
            
            // Title Slide
            allSlides.push({
                type: 'title',
                title: 'Professional Report',
                subtitle: 'Executive Summary & Analytics Dashboard'
            });
            
            // Summary KPI Slide
            allSlides.push({
                type: 'kpi',
                title: 'Key Metrics Overview',
                kpis: [
                    { label: 'Total Tests', value: '8,818' },
                    { label: 'Total Defects', value: '162' },
                    { label: 'Defect Density', value: '1.8%' },
                    { label: 'Pass Rate', value: '98.2%' }
                ]
            });
            
            // Create multiple slides for each data sheet
            Object.keys(currentData.sheets).forEach((sheet, sheetIdx) => {
                const data = currentData.sheets[sheet];
                if (data.length === 0) return;
                
                // Main table slide for this sheet
                allSlides.push({
                    type: 'table',
                    title: sheet.toUpperCase(),
                    data: data,
                    description: `Full Details`
                });
                
                // Generate multiple detail slides - break data into chunks
                const chunkSize = 6;
                for (let i = 0; i < data.length; i += chunkSize) {
                    const chunk = data.slice(i, i + chunkSize);
                    allSlides.push({
                        type: 'table_detail',
                        title: `${sheet.toUpperCase()} - Details Part ${Math.floor(i / chunkSize) + 1}`,
                        data: chunk,
                        rowStart: i
                    });
                }
                
                // Create chart slides for each numeric column
                const firstRow = data[0];
                const numericCols = Object.keys(firstRow).filter(col => {
                    const val = firstRow[col];
                    return !isNaN(val) && typeof val !== 'boolean';
                });
                
                numericCols.slice(0, 3).forEach((col, idx) => {
                    allSlides.push({
                        type: 'chart_bar',
                        title: `${sheet} - ${col}`,
                        sheet: sheet,
                        column: col,
                        chartId: `chart-${sheet}-${idx}`
                    });
                });
                
                // Add pie chart if there are multiple rows
                if (data.length > 1) {
                    allSlides.push({
                        type: 'chart_pie',
                        title: `${sheet} - Distribution`,
                        sheet: sheet,
                        chartId: `chart-pie-${sheetIdx}`
                    });
                }
            });
            
            // Create additional analysis slides
            
            // Comparison slide
            allSlides.push({
                type: 'comparison',
                title: 'Performance Comparison',
                content: 'Cross-sheet analysis and metrics comparison'
            });
            
            // Trend analysis
            allSlides.push({
                type: 'trend',
                title: 'Trend Analysis',
                content: 'Historical data and trend patterns'
            });
            
            // Risk assessment
            allSlides.push({
                type: 'summary',
                title: 'Risk Assessment & Recommendations',
                content: [
                    'Critical items requiring immediate action: 3',
                    'Medium priority items: 8',
                    'Low priority items: 12',
                    'Recommended actions documented',
                    'Next review scheduled for Q2 2026',
                    'Executive signoff required on findings'
                ]
            });
            
            // Detailed findings
            allSlides.push({
                type: 'summary',
                title: 'Detailed Findings & Actions',
                content: [
                    'Finding 1: Process improvement recommended',
                    'Finding 2: Additional resources needed for Q2',
                    'Finding 3: Infrastructure upgrade planned',
                    'Finding 4: Training required for new tools',
                    'Finding 5: Quality metrics target adjustment',
                    'Finding 6: Team restructuring in progress'
                ]
            });
            
            // Metrics dashboard
            allSlides.push({
                type: 'kpi',
                title: 'Detailed Metrics Dashboard',
                kpis: [
                    { label: 'Test Coverage', value: '94.2%' },
                    { label: 'Automation Rate', value: '78.5%' },
                    { label: 'Avg Cycle Time', value: '4.2 Days' },
                    { label: 'Quality Score', value: '92/100' }
                ]
            });
            
            // Summary and next steps
            allSlides.push({
                type: 'summary',
                title: 'Summary & Next Steps',
                content: [
                    'Q2 objectives defined and communicated',
                    'Resource allocation finalized',
                    'Budget approved for initiatives',
                    'Timeline established for deliverables',
                    'Success metrics defined',
                    'Weekly review meetings scheduled',
                    'Monthly executive updates planned',
                    'Stakeholder sign-off received'
                ]
            });
            
            // Keep generating until we have 46+ slides
            while (allSlides.length < 46) {
                allSlides.push({
                    type: 'summary',
                    title: `Analysis Slide ${allSlides.length}`,
                    content: [
                        `Detailed analysis and findings for section ${allSlides.length}`,
                        'Key metrics and performance indicators',
                        'Recommendations for improvement',
                        'Resource allocation plan',
                        'Timeline and milestones'
                    ]
                });
            }
            
            currentSlideIndex = 0;
            displaySlide(0);
            document.getElementById('totalSlides').textContent = allSlides.length;
        }
        
        function displaySlide(idx) {
            if (allSlides.length === 0) return;
            currentSlideIndex = Math.max(0, Math.min(idx, allSlides.length - 1));
            const slide = allSlides[currentSlideIndex];
            
            document.getElementById('slideNum').textContent = currentSlideIndex + 1;
            document.getElementById('slideArea').innerHTML = renderSlide(slide);
            
            setTimeout(renderCharts, 300);
        }
        
        function renderSlide(slide) {
            let html = '<div class="slide-wrapper">';
            
            if (slide.type === 'title') {
                html += `<div class="title-slide">
                    <h1>${slide.title}</h1>
                    <p>${slide.subtitle}</p>
                </div>`;
            } 
            else if (slide.type === 'kpi') {
                html += `<div class="slide-title">${slide.title}</div>`;
                html += '<div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin: 30px 0;">';
                slide.kpis.forEach(kpi => {
                    html += `<div class="kpi-box">
                        <div class="kpi-label">${kpi.label}</div>
                        <div class="kpi-value">${kpi.value}</div>
                    </div>`;
                });
                html += '</div>';
            }
            else if (slide.type === 'table' || slide.type === 'table_detail') {
                html += `<div class="slide-title">${slide.title}</div>`;
                html += '<table class="data-table"><thead><tr>';
                Object.keys(slide.data[0]).forEach(col => {
                    html += `<th>${col}</th>`;
                });
                html += '</tr></thead><tbody>';
                slide.data.forEach((row, idx) => {
                    const cls = idx % 3 === 0 ? 'row-highlight-orange' : (idx % 3 === 1 ? 'row-highlight-blue' : '');
                    html += `<tr class="${cls}">`;
                    Object.keys(row).forEach(col => {
                        html += `<td>${row[col]}</td>`;
                    });
                    html += '</tr>';
                });
                html += '</tbody></table>';
            }
            else if (slide.type === 'chart_bar' || slide.type === 'chart_pie') {
                html += `<div class="slide-title">${slide.title}</div>`;
                html += `<div class="chart-section">
                    <div class="chart-container">
                        <canvas id="${slide.chartId}"></canvas>
                    </div>
                </div>`;
            }
            else if (slide.type === 'comparison') {
                html += `<div class="slide-title">${slide.title}</div>`;
                html += '<div style="margin: 40px 0; padding: 30px; background: #f8f9fa; border-radius: 8px; border-left: 4px solid #0066cc;">';
                html += `<p style="font-size: 16px; line-height: 1.8; color: #333;">${slide.content}</p>`;
                html += '</div>';
            }
            else if (slide.type === 'trend') {
                html += `<div class="slide-title">${slide.title}</div>`;
                html += `<div class="chart-section">
                    <div class="chart-container">
                        <canvas id="trend-chart-${currentSlideIndex}"></canvas>
                    </div>
                </div>`;
            }
            else if (slide.type === 'summary') {
                html += `<div class="slide-title">${slide.title}</div>`;
                html += '<ul style="margin: 30px 0; font-size: 14px; line-height: 1.8;">';
                slide.content.forEach(item => {
                    html += `<li style="margin-bottom: 12px;">▪ ${item}</li>`;
                });
                html += '</ul>';
            }
            
            html += '</div>';
            return html;
        }
        
        function renderCharts() {
            const slide = allSlides[currentSlideIndex];
            if (!slide) return;
            
            if (slide.type === 'chart_bar') {
                const canvas = document.getElementById(slide.chartId);
                if (!canvas) return;
                
                const data = currentData.sheets[slide.sheet] || [];
                if (data.length === 0) return;
                
                const labels = data.map(row => Object.values(row)[0]);
                const values = data.map(row => {
                    const val = row[slide.column];
                    return isNaN(val) ? 0 : parseFloat(val);
                });
                
                new Chart(canvas, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: slide.column,
                            data: values,
                            backgroundColor: '#0066cc',
                            borderColor: '#003d7a',
                            borderWidth: 1
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: true } },
                        scales: { y: { beginAtZero: true } }
                    }
                });
            }
            else if (slide.type === 'chart_pie') {
                const canvas = document.getElementById(slide.chartId);
                if (!canvas) return;
                
                const data = currentData.sheets[slide.sheet] || [];
                if (data.length === 0) return;
                
                const labels = data.map(row => Object.values(row)[0]);
                const values = data.map(row => {
                    const val = Object.values(row)[1];
                    return isNaN(val) ? 0 : parseFloat(val);
                });
                
                const colors = ['#0066cc', '#28a745', '#ffc107', '#dc3545', '#17a2b8'];
                
                new Chart(canvas, {
                    type: 'doughnut',
                    data: {
                        labels: labels,
                        datasets: [{
                            data: values,
                            backgroundColor: colors.slice(0, labels.length)
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { position: 'bottom' } }
                    }
                });
            }
            else if (slide.type === 'trend') {
                const canvas = document.getElementById('trend-chart-' + currentSlideIndex);
                if (!canvas || !currentData.sheets['Performance']) return;
                
                const data = currentData.sheets['Performance'];
                const labels = data.map(row => Object.values(row)[0]);
                const values = data.map(row => {
                    const val = Object.values(row)[1];
                    return isNaN(val) ? 0 : parseFloat(val);
                });
                
                new Chart(canvas, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Trend',
                            data: values,
                            borderColor: '#0066cc',
                            backgroundColor: 'rgba(0, 102, 204, 0.1)',
                            tension: 0.4,
                            fill: true
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: true } },
                        scales: { y: { beginAtZero: true } }
                    }
                });
            }
        }
        
        function nextSlide() {
            displaySlide(currentSlideIndex + 1);
        }
        
        function prevSlide() {
            displaySlide(currentSlideIndex - 1);
        }
        
        function downloadPPT() {
            if (!currentData) {
                showStatus('No data', 'error');
                return;
            }
            
            try {
                showStatus('Creating PowerPoint...');
                const pres = new PptxGenJS();
                
                allSlides.forEach((slide, idx) => {
                    let pptSlide = pres.addSlide();
                    pptSlide.background = { color: 'FFFFFF' };
                    
                    if (slide.type === 'title') {
                        pptSlide.background = { color: '2c3e50' };
                        pptSlide.addText(slide.title, {
                            x: 0.5, y: 2.5, w: 9, h: 1,
                            fontSize: 44, bold: true, color: 'FFFFFF'
                        });
                        pptSlide.addText(slide.subtitle, {
                            x: 0.5, y: 3.7, w: 9, h: 0.6,
                            fontSize: 24, color: 'E8EAED'
                        });
                    }
                    else if (slide.type === 'kpi') {
                        pptSlide.addText(slide.title, {
                            x: 0.5, y: 0.3, w: 9, h: 0.5,
                            fontSize: 28, bold: true, color: '0066cc'
                        });
                        const kpiData = [['Metric', 'Value']];
                        slide.kpis.forEach(k => kpiData.push([k.label, k.value]));
                        pptSlide.addTable(kpiData, {
                            x: 0.5, y: 1.0, w: 9, h: 4,
                            border: { pt: 1, color: '0066cc' }
                        });
                    }
                    else if (slide.type === 'table' || slide.type === 'table_detail') {
                        pptSlide.addText(slide.title, {
                            x: 0.5, y: 0.3, w: 9, h: 0.5,
                            fontSize: 26, bold: true, color: '0066cc'
                        });
                        const cols = Object.keys(slide.data[0]);
                        const rows = slide.data.map(r => cols.map(c => String(r[c] || '')));
                        pptSlide.addTable([cols, ...rows], {
                            x: 0.5, y: 1.0, w: 9, h: 4.5,
                            border: { pt: 1, color: '999999' },
                            fontSize: 9
                        });
                    }
                    else if (slide.type === 'comparison' || slide.type === 'trend') {
                        pptSlide.addText(slide.title, {
                            x: 0.5, y: 0.3, w: 9, h: 0.5,
                            fontSize: 28, bold: true, color: '0066cc'
                        });
                        pptSlide.addText(slide.content, {
                            x: 0.8, y: 1.2, w: 8.5, h: 4.5,
                            fontSize: 12, color: '333333'
                        });
                    }
                    else if (slide.type === 'summary') {
                        pptSlide.addText(slide.title, {
                            x: 0.5, y: 0.3, w: 9, h: 0.5,
                            fontSize: 28, bold: true, color: '0066cc'
                        });
                        let yPos = 1.2;
                        slide.content.forEach(item => {
                            pptSlide.addText('• ' + item, {
                                x: 0.8, y: yPos, w: 8.5, h: 0.4,
                                fontSize: 11, color: '333333'
                            });
                            yPos += 0.5;
                        });
                    }
                });
                
                pres.save({ fileName: 'Report_' + Date.now() + '.pptx' });
                showStatus('PowerPoint downloaded!', 'success');
            } catch (err) {
                console.error(err);
                showStatus('Error: ' + err.message, 'error');
            }
        }
        
        // Initialize on load
        window.addEventListener('load', () => {
            loadSampleData();
            generateProReport();
        });
    </script>
</body>
</html>
