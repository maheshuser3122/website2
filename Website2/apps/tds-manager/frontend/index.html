<style>
:root {
  --navy: #060D1A;
  --navy2: #0C1E35;
  --navy3: #142848;
  --gold: #D4A032;
  --gold-light: #FFF0CC;
  --green: #10b981;
  --green-light: #D1FAE5;
  --green-mid: #059669;
  --orange: #F0BE56;
  --orange-light: #FFF0CC;
  --red: #ef4444;
  --red-light: #FEE2E2;
  --grey: #8A99B0;
  --grey-light: #0C1E35;
  --border: #203554;
  --text: #B8C5D6;
  --text-muted: #8A99B0;
  --white: #F4F1EA;
  --surface: #0C1E35;
  --shadow: 0 1px 3px rgba(0,0,0,.2), 0 1px 2px rgba(0,0,0,.1);
  --shadow-md: 0 4px 16px rgba(0,0,0,.3);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Barlow', 'DM Sans', sans-serif; background: var(--surface); color: var(--text); min-height: 100vh; }
code, .mono { font-family: 'DM Mono', monospace; }

/* GRID BG */
body::before{
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(212,160,50,0.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(212,160,50,0.04) 1px,transparent 1px);
  background-size:72px 72px;
  pointer-events:none;z-index:0;
}

/* Layout */
.app { display: flex; flex-direction: column; min-height: 100vh; }
.topbar { background: var(--navy); padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; }
.topbar-title { color: var(--white); font-size: 17px; font-weight: 600; letter-spacing: -.3px; }
.topbar-sub { color: var(--text-muted); font-size: 12px; margin-top: 2px; }
.topbar-badge { background: rgba(255,255,255,.1); color: #cbd5e1; font-size: 11px; padding: 4px 10px; border-radius: 20px; font-weight: 500; }

.nav { background: var(--navy3); border-bottom: 1px solid var(--border); padding: 0 32px; display: flex; gap: 0; }
.nav-btn { padding: 14px 20px; font-size: 13px; font-weight: 500; color: var(--text-muted); cursor: pointer; border: none; background: none; border-bottom: 2px solid transparent; font-family: 'Barlow', 'DM Sans', sans-serif; transition: all .15s; }
.nav-btn:hover { color: var(--gold); }
.nav-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

.main { flex: 1; padding: 28px 32px; max-width: 1400px; width: 100%; margin: 0 auto; }
.pane { display: none; }
.pane.active { display: block; }

/* Cards */
.card { background: var(--navy3); border: 1px solid var(--border); border-radius: 10px; box-shadow: var(--shadow); }
.card-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.card-title { font-size: 14px; font-weight: 600; color: var(--white); }
.card-body { padding: 20px; }

/* KPI grid */
.kpi-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; margin-bottom: 24px; }
.kpi { background: var(--navy3); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; box-shadow: var(--shadow); }
.kpi-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .6px; font-weight: 500; margin-bottom: 6px; }
.kpi-value { font-size: 22px; font-weight: 600; letter-spacing: -.5px; color: var(--white); }
.kpi-sub { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
.kpi.green .kpi-value { color: var(--green); }
.kpi.orange .kpi-value { color: var(--orange); }
.kpi.red .kpi-value { color: var(--red); }
.kpi.blue .kpi-value { color: var(--gold); }

/* Alerts */
.alerts { margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px; }
.alert { padding: 10px 14px; border-radius: 8px; font-size: 13px; display: flex; align-items: flex-start; gap: 8px; }
.alert.warn { background: rgba(240,190,86,.15); color: var(--orange); border-left: 3px solid var(--orange); }
.alert.info { background: rgba(212,160,50,.15); color: var(--gold); border-left: 3px solid var(--gold); }
.alert-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }

/* Table */
.tbl-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid var(--border); box-shadow: var(--shadow); }
table { width: 100%; border-collapse: collapse; font-size: 12.5px; white-space: nowrap; }
thead th { background: var(--navy3); font-size: 11px; font-weight: 600; color: var(--gold); text-transform: uppercase; letter-spacing: .5px; padding: 10px 14px; border-bottom: 1px solid var(--border); text-align: left; }
tbody td { padding: 10px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover { background: rgba(212,160,50,.05); }
tfoot td { padding: 10px 14px; font-weight: 600; background: var(--navy3); border-top: 1.5px solid var(--border); font-size: 12.5px; color: var(--text); }

.tr-complete { background: rgba(16,185,129,.1); }
.tr-pending  { background: rgba(240,190,86,.1); }
.tr-unpaid   { background: rgba(239,68,68,.1); }
.tr-notds    { background: rgba(212,160,50,.05); }
.tr-complete:hover { background: rgba(16,185,129,.2) !important; }
.tr-pending:hover  { background: rgba(240,190,86,.2) !important; }
.tr-unpaid:hover   { background: rgba(239,68,68,.2) !important; }

/* Badges */
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.badge.green  { background: rgba(16,185,129,.2); color: var(--green); }
.badge.orange { background: rgba(240,190,86,.2); color: var(--orange); }
.badge.red    { background: rgba(239,68,68,.2); color: var(--red); }
.badge.grey   { background: rgba(138,153,176,.1); color: var(--grey); }
.badge.blue   { background: rgba(212,160,50,.2); color: var(--gold); }

/* Buttons */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 7px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: 'Barlow', 'DM Sans', sans-serif; border: 1px solid var(--border); background: var(--navy3); color: var(--text); transition: all .15s; }
.btn:hover { background: rgba(212,160,50,.1); color: var(--gold); }
.btn.primary { background: var(--gold); color: var(--navy); border-color: var(--gold); }
.btn.primary:hover { background: var(--gold-light); border-color: var(--gold-light); }
.btn.success { background: var(--green); color: #fff; border-color: var(--green); }
.btn.danger { color: var(--red); border-color: rgba(239,68,68,.3); background: rgba(239,68,68,.1); }
.btn.danger:hover { background: rgba(239,68,68,.2); }
.btn.sm { padding: 5px 10px; font-size: 11px; }
.btn-group { display: flex; gap: 8px; align-items: center; }

/* Forms */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-group label { font-size: 12px; font-weight: 500; color: var(--text-muted); }
.form-group input, .form-group select, .form-group textarea {
  padding: 8px 11px; border: 1px solid var(--border); border-radius: 7px;
  font-size: 13px; font-family: 'Barlow', 'DM Sans', sans-serif; color: var(--text);
  background: var(--navy2); transition: border .15s;
}
.form-group input:focus, .form-group select:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 3px rgba(212,160,50,.15); }
.form-group input.auto-fill { background: rgba(16,185,129,.15); color: var(--green); font-family: 'DM Mono', monospace; font-size: 12px; cursor: default; }
.form-group input.calc-fill { background: rgba(212,160,50,.15); color: var(--gold); font-weight: 600; cursor: default; }
.form-section { margin-bottom: 20px; }
.form-section-title { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.divider { height: 1px; background: var(--border); margin: 20px 0; }

/* Payee entry rows */
.payee-entry-header {
  display: grid; grid-template-columns: 30px 1fr 130px 100px 100px 36px;
  gap: 8px; padding: 6px 0; font-size: 11px; font-weight: 600;
  color: var(--text-muted); text-transform: uppercase; letter-spacing: .4px;
  border-bottom: 1px solid var(--border); margin-bottom: 4px;
}
.payee-entry-row {
  display: grid; grid-template-columns: 30px 1fr 130px 100px 100px 36px;
  gap: 8px; align-items: center; padding: 5px 0;
  border-bottom: 1px solid #f1f5f9;
}
.payee-entry-row:last-child { border-bottom: none; }
.row-num { font-size: 11px; color: var(--text-muted); text-align: center; font-weight: 600; }
.calc-cell { background: var(--blue-light); color: var(--blue); font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 600; padding: 8px 10px; border-radius: 6px; text-align: right; }
.remove-btn { width: 28px; height: 28px; border-radius: 6px; border: 1px solid #fca5a5; background: var(--red-light); color: var(--red); font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.remove-btn:hover { background: #fee2e2; }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(15,39,68,.45); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
.modal { background: var(--white); border-radius: 12px; width: 100%; max-width: 780px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.2); }
.modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--white); z-index: 1; }
.modal-title { font-size: 15px; font-weight: 600; }
.modal-body { padding: 24px; }
.modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; background: var(--surface); border-radius: 0 0 12px 12px; }
.close-btn { width: 32px; height: 32px; border-radius: 6px; border: 1px solid var(--border); background: none; font-size: 16px; cursor: pointer; color: var(--text-muted); display: flex; align-items: center; justify-content: center; }
.close-btn:hover { background: var(--surface); }

/* Payee master table */
.payee-card { background: var(--white); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 6px 20px; }
.payee-field { font-size: 12px; display: flex; gap: 6px; }
.payee-field-label { color: var(--text-muted); min-width: 60px; }
.payee-field-val { font-weight: 500; }

/* Tag */
.tag { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 10.5px; font-weight: 600; background: var(--grey-light); color: var(--grey); }

/* Pill note */
.note { font-size: 11px; color: var(--orange); background: var(--orange-light); padding: 3px 8px; border-radius: 4px; font-style: italic; }

/* Detail expand row */
.expand-row td { padding: 0; }
.expand-inner { padding: 12px 20px; background: #f8fafc; border-top: 1px solid var(--border); }
.expand-inner table { background: var(--white); border-radius: 6px; overflow: hidden; border: 1px solid var(--border); }
.expand-inner thead th { background: #f1f5f9; font-size: 10.5px; padding: 7px 12px; }
.expand-inner tbody td { padding: 7px 12px; font-size: 12px; }

.empty-state { text-align: center; padding: 48px 20px; color: var(--text-muted); }
.empty-state .icon { font-size: 32px; margin-bottom: 10px; }
.empty-state p { font-size: 14px; }

/* Responsive */
@media (max-width: 900px) {
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  .main { padding: 16px; }
  .topbar { padding: 14px 16px; }
  .nav { padding: 0 16px; }
}

/* Toast */
.toast { position: fixed; bottom: 28px; right: 28px; background: var(--navy); color: #fff; padding: 12px 20px; border-radius: 8px; font-size: 13px; font-weight: 500; box-shadow: var(--shadow-md); z-index: 999; transform: translateY(80px); opacity: 0; transition: all .3s; }
.toast.show { transform: translateY(0); opacity: 1; }

.view-btn{padding:5px 12px;border:none;background:none;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;color:var(--text-muted);font-family:'DM Sans',sans-serif;transition:all .15s}
.view-btn:hover{color:var(--text)}
.vb-active{background:var(--white)!important;color:var(--navy)!important;box-shadow:0 1px 3px rgba(0,0,0,.12)}
.qbtn{padding:4px 10px;border:1px solid var(--border);background:var(--white);border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;color:var(--text-muted);font-family:'DM Sans',sans-serif;transition:all .15s}
.qbtn:hover{background:var(--grey-light)}
.qbtn-active{background:var(--navy)!important;color:#fff!important;border-color:var(--navy)!important}
</style>
</head>

  if(m.returnFiled==='Yes') return 'tr-complete';
  return 'tr-pending';
}

function toast(msg, dur=2500){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), dur);
}

// ── Persistence ───────────────────────────────────────────────────────────────
function saveData(){
  localStorage.setItem('tds_months_v2', JSON.stringify(months));
  localStorage.setItem('tds_nextid_v2', String(nextId));
}
function loadData(){
  const saved = localStorage.getItem('tds_months_v2');
  if(saved){
    try{ months=JSON.parse(saved); nextId=parseInt(localStorage.getItem('tds_nextid_v2')||'11'); return; }
    catch(e){}
  }
  months = JSON.parse(JSON.stringify(DEFAULT_MONTHS));
  nextId = 11;
}

// ── Tab switching ─────────────────────────────────────────────────────────────
function switchTab(name){
  document.querySelectorAll('.nav-btn').forEach((b,i)=>{
    b.classList.toggle('active',['dashboard','entry','payees','returns'][i]===name);
  });
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
  document.getElementById('pane-'+name).classList.add('active');
  if(name==='dashboard') renderDashboard();
  else if(name==='entry'){ entryPayees=[{name:'',net:''}]; renderEntryForm(null); }
  else if(name==='payees') renderPayees();
  else if(name==='returns') renderReturns();
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────

/* ─── view state ─────────────────────────────────────────────── */
let dashView = 'monthly';   // 'monthly' | 'quarter' | 'employee'
let filterQ   = 'all';      // 'all' | 'Q1' | 'Q2' | 'Q3' | 'Q4'

function renderDashboard(){
  const paidM    = months.filter(m=>m.paid==='Yes');
  const totCred  = months.reduce((s,m)=>s+m.credited,0);
  const totTDS   = months.reduce((s,m)=>s+m.tds,0);
  const depTDS   = paidM.reduce((s,m)=>s+m.tds,0);
  const retFiled = months.filter(m=>m.returnFiled==='Yes').length;
  const retPend  = months.filter(m=>m.returnFiled==='No'&&m.tds>0).length;

  let html = `<div class="kpi-grid">
    <div class="kpi"><div class="kpi-label">Total Credited</div><div class="kpi-value">${inrF(totCred)}</div><div class="kpi-sub">All months</div></div>
    <div class="kpi blue"><div class="kpi-label">Total TDS Liability</div><div class="kpi-value">${inr(totTDS)}</div><div class="kpi-sub">Across all months</div></div>
    <div class="kpi green"><div class="kpi-label">TDS Deposited</div><div class="kpi-value">${inr(depTDS)}</div><div class="kpi-sub">${paidM.length} months paid</div></div>
    <div class="kpi green"><div class="kpi-label">Returns Filed</div><div class="kpi-value">${retFiled}</div><div class="kpi-sub">months complete</div></div>
    <div class="kpi orange"><div class="kpi-label">Returns Pending</div><div class="kpi-value">${retPend}</div><div class="kpi-sub">months to file</div></div>
  </div>`;

  const corrections = months.filter(m=>m.comments&&m.comments.toLowerCase().includes('correction'));
  const pendRet     = months.filter(m=>m.returnFiled==='No'&&m.tds>0);
  const unpaidTax   = months.filter(m=>m.paid==='No'&&m.tds>0);
  if(corrections.length||pendRet.length||unpaidTax.length){
    html += '<div class="alerts">';
    if(corrections.length) html+=`<div class="alert warn"><span class="alert-icon">&#9888;</span><span><b>Correction needed:</b> ${corrections.map(m=>m.month).join(', ')} – wrong assessment year</span></div>`;
    if(pendRet.length)     html+=`<div class="alert warn"><span class="alert-icon">&#9888;</span><span><b>Return filing pending:</b> ${pendRet.map(m=>m.month).join(', ')}</span></div>`;
    if(unpaidTax.length)   html+=`<div class="alert warn"><span class="alert-icon">&#9888;</span><span><b>Tax payment pending:</b> ${unpaidTax.map(m=>m.month).join(', ')}</span></div>`;
    html += '</div>';
  }

  /* ── toolbar ── */
  html += `<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px">
    <div style="font-size:14px;font-weight:600;flex:1;min-width:120px">Monthly Summary</div>

    <!-- view toggle -->
    <div style="display:flex;gap:4px;background:var(--grey-light);border-radius:8px;padding:3px">
      <button class="view-btn ${dashView==='monthly'?'vb-active':''}"  onclick="setDashView('monthly')">By Month</button>
      <button class="view-btn ${dashView==='quarter'?'vb-active':''}"  onclick="setDashView('quarter')">By Quarter</button>
      <button class="view-btn ${dashView==='employee'?'vb-active':''}" onclick="setDashView('employee')">By Employee</button>
    </div>

    <!-- quarter filter (hidden in employee view) -->
    ${dashView!=='employee'?`<div style="display:flex;gap:4px">
      ${['all','Q1','Q2','Q3','Q4'].map(q=>`<button class="qbtn ${filterQ===q?'qbtn-active':''}" onclick="setFilterQ('${q}')">${q==='all'?'All Qtrs':q}</button>`).join('')}
    </div>`:''}

    <!-- export buttons -->
    <div style="display:flex;gap:6px">
      <button class="btn sm" onclick="exportCSV()">&#11015; CSV</button>
      <button class="btn sm primary" onclick="switchTab('entry')">+ Add Month</button>
    </div>
  </div>`;

  if(dashView==='monthly')       html += renderMonthlyTable();
  else if(dashView==='quarter')  html += renderQuarterTable();
  else                           html += renderEmployeeTable();

  document.getElementById('pane-dashboard').innerHTML = html;
}

function setDashView(v){ dashView=v; renderDashboard(); }
function setFilterQ(q){ filterQ=q; renderDashboard(); }
function toggleExpand(id){ if(expandedRows.has(id)) expandedRows.delete(id); else expandedRows.add(id); renderDashboard(); }

/* ══════════════════════════════════════════════════════════════
   VIEW 1 – BY MONTH (original, quarter-filtered)
══════════════════════════════════════════════════════════════ */
function renderMonthlyTable(){
  const rows = filterQ==='all' ? months : months.filter(m=>m.quarter===filterQ);

  let html = `<div class="tbl-wrap"><table>
    <thead><tr>
      <th></th><th>Month</th><th>Qtr</th><th>Credited (&#8377;)</th><th>Prof. Fee (&#8377;)</th>
      <th>TDS (&#8377;)</th><th>Tax Paid</th><th>Deposit Date</th><th>Challan</th>
      <th>Return Filed</th><th>Status</th><th>Comments</th><th>Action</th>
    </tr></thead><tbody>`;

  let prevQ = null;
  rows.forEach(m=>{
    /* quarter group header row */
    if(m.quarter !== prevQ){
      prevQ = m.quarter;
      const qMs = months.filter(x=>x.quarter===m.quarter);
      const qTDS = qMs.reduce((s,x)=>s+x.tds,0);
      const qCred= qMs.reduce((s,x)=>s+x.credited,0);
      const qAllFiled = qMs.filter(x=>x.tds>0).every(x=>x.returnFiled==='Yes');
      html += `<tr style="background:var(--navy);color:#fff">
        <td colspan="3" style="font-weight:700;font-size:12px;color:#fff;padding:8px 14px">
          ${m.quarter} &nbsp;·&nbsp; ${qMs.map(x=>x.month).join(', ')}
        </td>
        <td style="text-align:right;font-family:'DM Mono',monospace;font-size:12px;color:#cbd5e1">${inrF(qCred)}</td>
        <td></td>
        <td style="text-align:right;font-family:'DM Mono',monospace;font-size:12px;font-weight:700;color:#fff">${inr(qTDS)}</td>
        <td colspan="5" style="font-size:11px;color:#94a3b8;padding-left:10px">
          Return: <span style="color:${qAllFiled?'#86efac':'#fcd34d'}">${qAllFiled?'Filed':'Pending'}</span>
        </td>
        <td colspan="2"></td>
      </tr>`;
    }

    const s    = rowStatus(m);
    const hasP = m.payees && m.payees.length>0;
    const isExp= expandedRows.has(m.id);
    html += `<tr class="${rowCls(m)}">
      <td>${hasP?`<button class="btn sm" onclick="toggleExpand(${m.id})" style="padding:3px 7px;font-size:11px">${isExp?'&#9650;':'&#9660;'}</button>`:''}</td>
      <td style="font-weight:600;padding-left:22px">${m.month}</td>
      <td><span class="tag">${m.quarter}</span></td>
      <td style="text-align:right;font-family:'DM Mono',monospace;font-size:12px">${inrF(m.credited)}</td>
      <td style="text-align:right;font-family:'DM Mono',monospace;font-size:12px">${m.profFee?inrF(m.profFee):'—'}</td>
      <td style="text-align:right;font-family:'DM Mono',monospace;font-size:12px;font-weight:600">${m.tds?inr(m.tds):'—'}</td>
      <td><span class="badge ${m.paid==='Yes'?'green':m.paid==='No'&&m.tds>0?'red':'grey'}">${m.paid}</span></td>
      <td style="font-size:12px">${m.depositDate||'—'}</td>
      <td style="font-size:12px;font-family:'DM Mono',monospace">${m.challan||'—'}</td>
      <td><span class="badge ${m.returnFiled==='Yes'?'green':m.returnFiled==='No'?'orange':'grey'}">${m.returnFiled||'—'}</span></td>
      <td><span class="badge ${s.cls}">${s.label}</span></td>
      <td style="font-size:11px;color:var(--orange);max-width:140px;white-space:normal">${m.comments||''}</td>
      <td><button class="btn sm" onclick="openEdit(${m.id})">Edit</button></td>
    </tr>`;

    if(isExp && hasP){
      const totN=m.payees.reduce((s,p)=>s+(p.net||0),0);
      const totT=m.payees.reduce((s,p)=>s+(p.tds||0),0);
      const totG=m.payees.reduce((s,p)=>s+(p.gross||0),0);
      html += `<tr style="background:#f8fafc"><td colspan="13"><div style="padding:10px 22px">
        <table style="background:#fff;border-radius:6px;overflow:hidden;border:1px solid var(--border)">
          <thead><tr><th>#</th><th>Payee</th><th>PAN</th>
            <th style="text-align:right">Amt Paid</th><th style="text-align:right">TDS</th><th style="text-align:right">Gross</th>
          </tr></thead><tbody>`;
      m.payees.forEach((p,i)=>{
        const pd=PAYEES.find(x=>x.name===p.name)||{};
        html+=`<tr><td>${i+1}</td><td style="font-weight:500">${p.name}</td>
          <td style="font-family:'DM Mono',monospace;font-size:11px;color:var(--blue)">${pd.pan||'—'}</td>
          <td style="text-align:right;font-family:'DM Mono',monospace;color:var(--green)">${inr(p.net)}</td>
          <td style="text-align:right;font-family:'DM Mono',monospace;color:var(--red)">${inr(p.tds)}</td>
          <td style="text-align:right;font-family:'DM Mono',monospace">${inr(p.gross)}</td>
        </tr>`;
      });
      html+=`</tbody><tfoot><tr><td colspan="3" style="font-weight:600">Total</td>
        <td style="text-align:right;font-weight:600">${inr(totN)}</td>
        <td style="text-align:right;font-weight:600">${inr(totT)}</td>
        <td style="text-align:right;font-weight:600">${inr(totG)}</td>
      </tr></tfoot></table></div></td></tr>`;

  const fRows = filterQ==='all' ? months : rows;
  const totC=fRows.reduce((s,m)=>s+m.credited,0);
  const totF=fRows.reduce((s,m)=>s+m.profFee,0);
  const totT=fRows.reduce((s,m)=>s+m.tds,0);
  html+=`</tbody><tfoot><tr>
    <td></td><td colspan="2" style="font-weight:600">Grand Total</td>
    <td style="text-align:right;font-family:'DM Mono',monospace">${inrF(totC)}</td>
    <td style="text-align:right;font-family:'DM Mono',monospace">${inrF(totF)}</td>
    <td style="text-align:right;font-family:'DM Mono',monospace;font-weight:600">${inr(totT)}</td>
    <td colspan="7"></td>
  </tr></tfoot></table></div>`;
  return html;
}

/* ══════════════════════════════════════════════════════════════
   VIEW 2 – BY QUARTER
══════════════════════════════════════════════════════════════ */
function renderQuarterTable(){
  const QINFO = {Q1:{period:'Apr–Jun 2025',due:'15-Jul-25'},Q2:{period:'Jul–Sep 2025',due:'15-Oct-25'},Q3:{period:'Oct–Dec 2025',due:'15-Jan-26'},Q4:{period:'Jan–Mar 2026',due:'15-May-26'}};
  const qs = filterQ==='all' ? ['Q1','Q2','Q3','Q4'] : [filterQ];

  let html = `<div style="display:flex;flex-direction:column;gap:20px">`;

  qs.forEach(q=>{
    const qMs = months.filter(m=>m.quarter===q);
    if(!qMs.length) return;
    const info = QINFO[q]||{period:'',due:''};
    const totCred = qMs.reduce((s,m)=>s+m.credited,0);
    const totFee  = qMs.reduce((s,m)=>s+m.profFee,0);
    const totTDS  = qMs.reduce((s,m)=>s+m.tds,0);
    const totDep  = qMs.filter(m=>m.paid==='Yes').reduce((s,m)=>s+m.tds,0);
    const tdsMs   = qMs.filter(m=>m.tds>0);
    const allPaid = tdsMs.length>0 && tdsMs.every(m=>m.paid==='Yes');
    const allFiled= tdsMs.length>0 && tdsMs.every(m=>m.returnFiled==='Yes');
    const hasCorrn= qMs.some(m=>m.comments&&m.comments.toLowerCase().includes('correction'));

    /* quarter KPI bar */
    html += `<div class="card">
      <div class="card-header" style="background:var(--navy);border-radius:10px 10px 0 0;border:none">
        <div>
          <div style="font-size:15px;font-weight:700;color:#fff">${q} &nbsp;·&nbsp; ${info.period}</div>
          <div style="font-size:11px;color:#94a3b8;margin-top:2px">Due: ${info.due} &nbsp;|&nbsp; Months: ${qMs.map(m=>m.month).join(', ')}</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          ${hasCorrn?'<span class="badge orange">Correction Needed</span>':''}
          <span class="badge ${allFiled?'green':'orange'}">${allFiled?'Return Filed':'Return Pending'}</span>
          <span class="badge ${allPaid?'green':'red'}">${allPaid?'Tax Paid':'Tax Pending'}</span>
          <button class="btn sm" style="background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.3)" onclick="exportQuarterCSV('${q}')">&#11015; Export ${q}</button>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:0;border-bottom:1px solid var(--border)">
        <div style="padding:12px 16px;border-right:1px solid var(--border)"><div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Total Credited</div><div style="font-size:16px;font-weight:600">${inrF(totCred)}</div></div>
        <div style="padding:12px 16px;border-right:1px solid var(--border)"><div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Prof. Fee</div><div style="font-size:16px;font-weight:600">${inrF(totFee)}</div></div>
        <div style="padding:12px 16px;border-right:1px solid var(--border)"><div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">TDS Liability</div><div style="font-size:16px;font-weight:600;color:var(--blue)">${inr(totTDS)}</div></div>
        <div style="padding:12px 16px"><div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">TDS Deposited</div><div style="font-size:16px;font-weight:600;color:var(--green)">${inr(totDep)}</div></div>
      </div>

      <!-- month rows -->
      <div class="tbl-wrap" style="border:none;border-radius:0;box-shadow:none">
      <table>
        <thead><tr>
          <th>Month</th><th>Credited (&#8377;)</th><th>Prof. Fee (&#8377;)</th><th>TDS (&#8377;)</th>
          <th>Tax Paid</th><th>Deposit Date</th><th>Challan</th><th>Return Filed</th><th>Status</th><th>Action</th>
        </tr></thead><tbody>`;

    qMs.forEach(m=>{
      const s=rowStatus(m);
      html+=`<tr class="${rowCls(m)}">
        <td style="font-weight:600">${m.month}</td>
        <td style="text-align:right;font-family:'DM Mono',monospace;font-size:12px">${inrF(m.credited)}</td>
        <td style="text-align:right;font-family:'DM Mono',monospace;font-size:12px">${m.profFee?inrF(m.profFee):'—'}</td>
        <td style="text-align:right;font-family:'DM Mono',monospace;font-size:12px;font-weight:600">${m.tds?inr(m.tds):'—'}</td>
        <td><span class="badge ${m.paid==='Yes'?'green':m.paid==='No'&&m.tds>0?'red':'grey'}">${m.paid}</span></td>
        <td style="font-size:12px">${m.depositDate||'—'}</td>
        <td style="font-size:12px;font-family:'DM Mono',monospace">${m.challan||'—'}</td>
        <td><span class="badge ${m.returnFiled==='Yes'?'green':m.returnFiled==='No'?'orange':'grey'}">${m.returnFiled||'—'}</span></td>
        <td><span class="badge ${s.cls}">${s.label}</span></td>
        <td><button class="btn sm" onclick="openEdit(${m.id})">Edit</button></td>
      </tr>`;
    });

    /* per-payee summary for this quarter */
    const payeeSummary = {};
    qMs.forEach(m=>(m.payees||[]).forEach(p=>{
      if(!payeeSummary[p.name]) payeeSummary[p.name]={net:0,tds:0,gross:0};
      payeeSummary[p.name].net  += p.net||0;
      payeeSummary[p.name].tds  += p.tds||0;
      payeeSummary[p.name].gross+= p.gross||0;
    }));

    if(Object.keys(payeeSummary).length){
      html += `</tbody></table></div>
      <div style="border-top:1px solid var(--border);padding:14px 16px">
        <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);margin-bottom:10px">${q} – Per Employee Summary</div>
        <div class="tbl-wrap" style="border-radius:8px"><table>
          <thead><tr><th>Employee</th><th>PAN</th>
            <th style="text-align:right">Amt Paid (&#8377;)</th>
            <th style="text-align:right">TDS (&#8377;)</th>
            <th style="text-align:right">Gross (&#8377;)</th>
          </tr></thead><tbody>`;
      let pTotN=0,pTotT=0,pTotG=0;
      Object.entries(payeeSummary).forEach(([name,d])=>{
        const pd=PAYEES.find(x=>x.name===name)||{};
        pTotN+=d.net; pTotT+=d.tds; pTotG+=d.gross;
        html+=`<tr><td style="font-weight:500">${name}</td>
          <td style="font-family:'DM Mono',monospace;font-size:11px;color:var(--blue)">${pd.pan||'—'}</td>
          <td style="text-align:right;font-family:'DM Mono',monospace;color:var(--green)">${inr(d.net)}</td>
          <td style="text-align:right;font-family:'DM Mono',monospace;color:var(--red)">${inr(d.tds)}</td>
          <td style="text-align:right;font-family:'DM Mono',monospace">${inr(d.gross)}</td>
        </tr>`;
      });
      html+=`</tbody><tfoot><tr><td colspan="2" style="font-weight:600">Total</td>
        <td style="text-align:right;font-weight:600">${inr(pTotN)}</td>
        <td style="text-align:right;font-weight:600">${inr(pTotT)}</td>
        <td style="text-align:right;font-weight:600">${inr(pTotG)}</td>
      </tr></tfoot></table></div></div>`;
    } else {
      html += `</tbody></table></div>`;
    }
    html += `</div>`; // end card
  });

  html += `</div>`;
  return html;
}

/* ══════════════════════════════════════════════════════════════
   VIEW 3 – BY EMPLOYEE
══════════════════════════════════════════════════════════════ */
function renderEmployeeTable(){
  /* build: empMap[name][quarter] = {net,tds,gross,months:[]} */
  const empMap = {};
  months.forEach(m=>{
    (m.payees||[]).forEach(p=>{
      if(!empMap[p.name]) empMap[p.name]={Q1:{net:0,tds:0,gross:0,months:[]},Q2:{net:0,tds:0,gross:0,months:[]},Q3:{net:0,tds:0,gross:0,months:[]},Q4:{net:0,tds:0,gross:0,months:[]},total:{net:0,tds:0,gross:0}};
      const d=empMap[p.name][m.quarter];
      d.net  +=(p.net||0); d.tds  +=(p.tds||0); d.gross+=(p.gross||0);
      if(!d.months.includes(m.month)) d.months.push(m.month);
      empMap[p.name].total.net  +=(p.net||0);
      empMap[p.name].total.tds  +=(p.tds||0);
      empMap[p.name].total.gross+=(p.gross||0);
    });
  });

  if(!Object.keys(empMap).length){
    return `<div class="empty-state"><div class="icon">&#128100;</div><p>No payee breakdown data yet. Add payees when editing months.</p></div>`;
  }

  const qs=['Q1','Q2','Q3','Q4'];
  let html=`<div class="tbl-wrap"><table>
    <thead><tr>
      <th>Employee</th><th>PAN</th>
      ${qs.map(q=>`<th style="text-align:right">${q} Amt Paid</th><th style="text-align:right">${q} TDS</th>`).join('')}
      <th style="text-align:right">Total TDS</th><th style="text-align:right">Total Gross</th>
    </tr></thead><tbody>`;

  let grandTDS=0, grandGross=0;
  Object.entries(empMap).sort((a,b)=>b[1].total.tds-a[1].total.tds).forEach(([name,d])=>{
    const pd=PAYEES.find(x=>x.name===name)||{};
    grandTDS  +=d.total.tds;
    grandGross+=d.total.gross;
    html+=`<tr>
      <td style="font-weight:600">${name}<br><span style="font-size:10px;color:var(--text-muted)">${pd.bank||''}</span></td>
      <td style="font-family:'DM Mono',monospace;font-size:11px;color:var(--blue)">${pd.pan||'—'}</td>
      ${qs.map(q=>{
        const qd=d[q];
        return qd.tds>0
          ? `<td style="text-align:right;font-family:'DM Mono',monospace;font-size:12px;color:var(--green)">${inr(qd.net)}<br><span style="font-size:10px;color:var(--text-muted)">${qd.months.join(', ')}</span></td>
             <td style="text-align:right;font-family:'DM Mono',monospace;font-size:12px;color:var(--red)">${inr(qd.tds)}</td>`
          : `<td style="text-align:right;color:var(--text-muted)">—</td><td style="text-align:right;color:var(--text-muted)">—</td>`;
      }).join('')}
      <td style="text-align:right;font-family:'DM Mono',monospace;font-weight:700;color:var(--navy)">${inr(d.total.tds)}</td>
      <td style="text-align:right;font-family:'DM Mono',monospace;font-weight:700">${inr(d.total.gross)}</td>
    </tr>`;
  });

  html+=`</tbody><tfoot><tr>
    <td colspan="2" style="font-weight:600">Grand Total</td>
    ${qs.map(q=>`<td></td><td style="text-align:right;font-weight:600">${inr(months.reduce((s,m)=>s+(m.payees||[]).filter(p=>m.quarter===q).reduce((ss,p)=>ss+(p.tds||0),0),0))}</td>`).join('')}
    <td style="text-align:right;font-weight:600">${inr(grandTDS)}</td>
    <td style="text-align:right;font-weight:600">${inr(grandGross)}</td>
  </tr></tfoot></table></div>`;
  return html;
}

/* ══════════════════════════════════════════════════════════════
   EXPORT FUNCTIONS
══════════════════════════════════════════════════════════════ */
function toCSV(rows, cols){
  const esc = v => `"${String(v||'').replace(/"/g,'""')}"`;
  return [cols.map(c=>esc(c.label)), ...rows.map(r=>cols.map(c=>esc(c.val(r))))].map(r=>r.join(',')).join('\n');
}
function download(csv, fname){
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download=fname; a.click();
}

function exportCSV(){
  if(dashView==='employee') exportEmployeeCSV();
  else if(dashView==='quarter') exportAllQuartersCSV();
  else exportMonthlyCSV();
}

function exportMonthlyCSV(){
  const rows = filterQ==='all' ? months : months.filter(m=>m.quarter===filterQ);
  const cols=[
    {label:'Month',        val:r=>r.month},
    {label:'Quarter',      val:r=>r.quarter},
    {label:'Credited (INR)',val:r=>r.credited},
    {label:'Prof Fee (INR)',val:r=>r.profFee},
    {label:'TDS (INR)',    val:r=>r.tds},
    {label:'Tax Paid',     val:r=>r.paid},
    {label:'Deposit Date', val:r=>r.depositDate},
    {label:'Challan No',   val:r=>r.challan},
    {label:'BSR Code',     val:r=>r.bsr},
    {label:'Return Filed', val:r=>r.returnFiled},
    {label:'Filing Date',  val:r=>r.filingDate},
    {label:'Ack No',       val:r=>r.ackNo},
    {label:'Comments',     val:r=>r.comments},
  ];
  download(toCSV(rows,cols), `TDS_Monthly_${filterQ==='all'?'All':filterQ}_${new Date().toISOString().slice(0,10)}.csv`);
}

function exportQuarterCSV(q){
  const qMs = months.filter(m=>m.quarter===q);
  /* flat: one row per payee per month */
  const rows=[];
  qMs.forEach(m=>{
    if(m.payees&&m.payees.length){
      m.payees.forEach(p=>{
        const pd=PAYEES.find(x=>x.name===p.name)||{};
        rows.push({quarter:q,month:m.month,name:p.name,pan:pd.pan||'',
          net:p.net||0,tds:p.tds||0,gross:p.gross||0,
          paid:m.paid,depositDate:m.depositDate,challan:m.challan,
          returnFiled:m.returnFiled,ackNo:m.ackNo,comments:m.comments});
      });
    } else {
      rows.push({quarter:q,month:m.month,name:'(no payee breakdown)',pan:'',
        net:'',tds:m.tds,gross:'',paid:m.paid,depositDate:m.depositDate,
        challan:m.challan,returnFiled:m.returnFiled,ackNo:m.ackNo,comments:m.comments});
    }
  });
  /* add quarter summary rows */
  rows.push({});
  const pSummary={};
  qMs.forEach(m=>(m.payees||[]).forEach(p=>{
    if(!pSummary[p.name]) pSummary[p.name]={net:0,tds:0,gross:0};
    pSummary[p.name].net+=p.net||0; pSummary[p.name].tds+=p.tds||0; pSummary[p.name].gross+=p.gross||0;
  }));
  rows.push({quarter:'SUMMARY',month:'',name:'EMPLOYEE',pan:'PAN',net:'AMT PAID',tds:'TDS',gross:'GROSS'});
  Object.entries(pSummary).forEach(([n,d])=>{
    const pd=PAYEES.find(x=>x.name===n)||{};
    rows.push({quarter:'',month:'',name:n,pan:pd.pan||'',net:d.net,tds:d.tds,gross:d.gross});
  });
  const cols=[
    {label:'Quarter',val:r=>r.quarter||''},{label:'Month',val:r=>r.month||''},
    {label:'Employee',val:r=>r.name||''},{label:'PAN',val:r=>r.pan||''},
    {label:'Amt Paid (INR)',val:r=>r.net||''},{label:'TDS (INR)',val:r=>r.tds||''},
    {label:'Gross (INR)',val:r=>r.gross||''},{label:'Tax Paid',val:r=>r.paid||''},
    {label:'Deposit Date',val:r=>r.depositDate||''},{label:'Challan',val:r=>r.challan||''},
    {label:'Return Filed',val:r=>r.returnFiled||''},{label:'Ack No',val:r=>r.ackNo||''},
    {label:'Comments',val:r=>r.comments||''},
  ];
  download(toCSV(rows,cols), `TDS_${q}_${new Date().toISOString().slice(0,10)}.csv`);
}

function exportAllQuartersCSV(){
  ['Q1','Q2','Q3','Q4'].forEach((q,i)=>{
    if(months.some(m=>m.quarter===q)) setTimeout(()=>exportQuarterCSV(q), i*200);
  });
}

function exportEmployeeCSV(){
  const empMap={};
  months.forEach(m=>(m.payees||[]).forEach(p=>{
    if(!empMap[p.name]) empMap[p.name]={Q1:{net:0,tds:0,gross:0},Q2:{net:0,tds:0,gross:0},Q3:{net:0,tds:0,gross:0},Q4:{net:0,tds:0,gross:0},total:{net:0,tds:0,gross:0}};
    const pd=PAYEES.find(x=>x.name===p.name)||{};
    empMap[p.name].pan=pd.pan||'';

    empMap[p.name][m.quarter].tds  +=(p.tds||0);
    empMap[p.name][m.quarter].gross+=(p.gross||0);

  const rows=Object.entries(empMap).map(([name,d])=>({
    name,pan:d.pan||'',
    q1net:d.Q1.net,q1tds:d.Q1.tds,q1gross:d.Q1.gross,
    q2net:d.Q2.net,q2tds:d.Q2.tds,q2gross:d.Q2.gross,
    q3net:d.Q3.net,q3tds:d.Q3.tds,q3gross:d.Q3.gross,
    q4net:d.Q4.net,q4tds:d.Q4.tds,q4gross:d.Q4.gross,
    totNet:d.total.net,totTDS:d.total.tds,totGross:d.total.gross
  }));
  const cols=[
    {label:'Employee',val:r=>r.name},{label:'PAN',val:r=>r.pan},
    {label:'Q1 Amt Paid',val:r=>r.q1net},{label:'Q1 TDS',val:r=>r.q1tds},{label:'Q1 Gross',val:r=>r.q1gross},
    {label:'Q2 Amt Paid',val:r=>r.q2net},{label:'Q2 TDS',val:r=>r.q2tds},{label:'Q2 Gross',val:r=>r.q2gross},
    {label:'Q3 Amt Paid',val:r=>r.q3net},{label:'Q3 TDS',val:r=>r.q3tds},{label:'Q3 Gross',val:r=>r.q3gross},
    {label:'Q4 Amt Paid',val:r=>r.q4net},{label:'Q4 TDS',val:r=>r.q4tds},{label:'Q4 Gross',val:r=>r.q4gross},
    {label:'Total TDS',val:r=>r.totTDS},{label:'Total Gross',val:r=>r.totGross},
  ];
  download(toCSV(rows,cols), `TDS_ByEmployee_${new Date().toISOString().slice(0,10)}.csv`);
}


// ── PAYEE ROW (shared between entry form and edit modal) ─────────────────────
// Input: Amount Paid (net) by user
// Input: Amount Paid (gross). TDS = Amount Paid x 10%. Net = Amount Paid - TDS.
function payeeRowHTML(i, row){
  const net   = Number(row.net||row.gross||0);
  const tds   = net?Math.round(net*0.1):'';
  const grossTotal = net&&tds!==''?net+tds:'';
  const opts  = PAYEES.map(p=>`<option value="${p.name}"${p.name===row.name?' selected':''}>${p.name}</option>`).join('');
  return `<div class="payee-entry-row" id="prow-${i}">
    <div class="row-num">${i+1}</div>
    <select id="pname-${i}" onchange="onNameChange(${i})"
      style="font-size:13px;padding:7px 10px;border:1px solid var(--border);border-radius:7px;width:100%;font-family:'DM Sans',sans-serif">
      <option value="">— select payee —</option>${opts}
    </select>
    <input type="number" id="pnet-${i}" value="${net||''}" placeholder="Net paid to consultant"
      oninput="onNetChange(${i})"
      style="text-align:right;padding:7px 10px;border:1px solid var(--border);border-radius:7px;font-family:'DM Mono',monospace;font-size:13px">
    <div class="calc-cell" id="ptds-${i}">${tds!==''?'&#8377;'+Number(tds).toLocaleString('en-IN'):'—'}</div>
    <div class="calc-cell" id="pgross-${i}">${grossTotal!==''?'&#8377;'+Number(grossTotal).toLocaleString('en-IN'):'—'}</div>
    <button class="remove-btn" onclick="removeRow(${i})">&#10005;</button>
  </div>`;
}

function onNameChange(i){
  if(entryPayees[i]) entryPayees[i].name = document.getElementById('pname-'+i)?.value||'';
}
function onNetChange(i){
  const net = Number(document.getElementById('pnet-'+i)?.value||0);
  const tds = Math.round(net*0.1);
  const gross = net + tds;
  if(entryPayees[i]){ entryPayees[i].net = net; entryPayees[i].tds = tds; entryPayees[i].gross = gross; }
  const te=document.getElementById('ptds-'+i);
  const ge=document.getElementById('pgross-'+i);
  if(te) te.innerHTML = net?'&#8377;'+tds.toLocaleString('en-IN'):'—';
  if(ge) ge.innerHTML = net?'&#8377;'+gross.toLocaleString('en-IN'):'—';
}

function addRow(){
  entryPayees.push({name:'',net:''});
  const i = entryPayees.length-1;
  const container = document.getElementById('payee-rows');
  if(!container) return;
  const div = document.createElement('div');
  div.innerHTML = payeeRowHTML(i,{name:'',net:''});
  container.appendChild(div.firstElementChild);
}

function removeRow(i){
  // Read current values from DOM before splicing
  entryPayees = entryPayees.map((_,idx)=>({
    name:  document.getElementById('pname-'+idx)?.value||entryPayees[idx]?.name||'',
    net: Number(document.getElementById('pnet-'+idx)?.value||entryPayees[idx]?.net||0),
  }));
  entryPayees.splice(i,1);
  if(entryPayees.length===0) entryPayees=[{name:'',net:''}];
  const container=document.getElementById('payee-rows');
  if(!container) return;
  container.innerHTML = entryPayees.map((r,idx)=>payeeRowHTML(idx,r)).join('');
}

function collectPayees(){
  // Read live from DOM – always authoritative
  const rows=[];
  let i=0;
  while(document.getElementById('pname-'+i)){
    const name  = document.getElementById('pname-'+i)?.value||'';
    const net   = Number(document.getElementById('pnet-'+i)?.value||0);
    const tds   = Math.round(net*0.1);
    const gross = net + tds;
    if(name && net>0) rows.push({name,net,tds,gross});
    i++;
  }
  return rows;
}

function getFormValues(prefix){
  const g = id => document.getElementById(prefix+id)?.value||'';
  return {
    month:       g('month').trim(),
    quarter:     g('qtr')||'Q4',
    credited:    Number(g('credited')||0),
    paid:        g('paid')||'No',
    depositDate: g('depdate'),
    challan:     g('challan'),
    bsr:         g('bsr'),
    returnFiled: g('ret')||'No',
    filingDate:  g('fildate'),
    ackNo:       g('ack'),
    comments:    g('comments'),
  };
}

function saveNewEntry(){
  const f = getFormValues('e-');
  if(!f.month){ alert('Please enter a month name.'); return; }
  const payees  = collectPayees();
  const profFee = payees.length ? payees.reduce((s,p)=>s+p.gross,0) : 0;
  const tds     = payees.length ? payees.reduce((s,p)=>s+p.tds,0)   : Math.round(f.credited*0.1);
  months.push({id:nextId++, ...f, profFee, tds, payees});
  saveData();
  entryPayees=[{name:'',net:''}];
  toast('Month saved! Dashboard updated.');
  switchTab('dashboard');
}

  document.getElementById('edit-modal').style.display='none';

}

function saveModal(){
  const f = getFormValues('m-');
  if(!f.month){ alert('Month name cannot be empty.'); return; }
  const payees  = collectPayees();
  const profFee = payees.length ? payees.reduce((s,p)=>s+p.gross,0) : 0;
  const tds     = payees.length ? payees.reduce((s,p)=>s+p.tds,0)
                                : (months.find(x=>x.id===currentEditId)?.tds||0);
  const idx = months.findIndex(x=>x.id===currentEditId);

  closeModal();
  toast('Changes saved!');
  renderDashboard();

  months=months.filter(m=>m.id!==currentEditId);

      <td style="font-size:12px">${p.bank}</td>
      ${activeMons.map(m=>{const v=d.months[m]||0;return`<td style="text-align:right;font-family:'DM Mono',monospace;font-size:12px">${v?'<span style="color:var(--green);font-weight:500">&#8377;'+v.toLocaleString('en-IN')+'</span>':'<span style="color:var(--text-muted)">—</span>'}</td>`;}).join('')}
      <td style="text-align:right;font-family:'DM Mono',monospace;font-weight:600;color:var(--navy)">${d.total?'&#8377;'+d.total.toLocaleString('en-IN'):'—'}</td>
    </tr>`;
  });
  html+=`</tbody></table></div>`;
  document.getElementById('pane-payees').innerHTML=html;
}

// ── RETURN STATUS ──────────────────────────────────────────────────────────────
function renderReturns(){
  const quarters={Q1:{period:'Apr–Jun 2025',due:'15-Jul-25'},Q2:{period:'Jul–Sep 2025',due:'15-Oct-25'},Q3:{period:'Oct–Dec 2025',due:'15-Jan-26'},Q4:{period:'Jan–Mar 2026',due:'15-May-26'}};
  const qData={};
  months.forEach(m=>{
    if(!qData[m.quarter]) qData[m.quarter]={months:[],tds:0,corrections:[],filingDates:[],acks:[]};
    const d=qData[m.quarter];
    d.months.push(m.month);
    d.tds+=m.tds;
    if(m.returnFiled==='Yes'){if(m.filingDate)d.filingDates.push(m.filingDate);if(m.ackNo)d.acks.push(m.ackNo);}
    if(m.comments&&m.comments.toLowerCase().includes('correction')) d.corrections.push(m.month);
  });
  let html=`<div style="font-size:15px;font-weight:600;margin-bottom:16px">Return Filing Status – Form 26Q</div>
  <div class="tbl-wrap"><table><thead><tr>
    <th>Quarter</th><th>Period</th><th>Months</th><th>Due Date</th>
    <th style="text-align:right">Total TDS (&#8377;)</th><th>Tax Paid</th><th>Return Filed</th>
    <th>Filing Date</th><th>Ack. No.</th><th>Correction</th><th>Status</th><th>Notes</th>
  </tr></thead><tbody>`;
  ['Q1','Q2','Q3','Q4'].forEach(q=>{
    const info=quarters[q];
    const d=qData[q];
    if(!d){html+=`<tr><td>${q}</td><td>${info.period}</td><td colspan="10" style="color:var(--text-muted)">No data</td></tr>`;return;}
    const hasTDS=d.tds>0;
    const tdsMs=months.filter(m=>m.quarter===q&&m.tds>0);
    const allPaid=tdsMs.length>0&&tdsMs.every(m=>m.paid==='Yes');
    const allFiled=tdsMs.length>0&&tdsMs.every(m=>m.returnFiled==='Yes');
    const hasCorrn=d.corrections.length>0;
    let status,scls;
    if(!hasTDS){status='No TDS';scls='grey';}
    else if(allFiled){status='Complete';scls='green';}
    else if(allPaid){status='Return Pending';scls='orange';}
    else{status='Tax Pending';scls='red';}
    const trcls=allFiled&&hasTDS?'tr-complete':!hasTDS?'tr-notds':'tr-pending';
    html+=`<tr class="${trcls}">
      <td style="font-weight:700">${q}</td>
      <td>${info.period}</td>
      <td style="font-size:12px">${d.months.join(', ')}</td>
      <td style="font-size:12px">${info.due}</td>
      <td style="text-align:right;font-family:'DM Mono',monospace;font-weight:600">${hasTDS?inr(d.tds):'—'}</td>
      <td><span class="badge ${allPaid&&hasTDS?'green':hasTDS?'orange':'grey'}">${allPaid?'Yes':'Partial'}</span></td>
      <td><span class="badge ${allFiled&&hasTDS?'green':hasTDS?'orange':'grey'}">${allFiled?'Yes':'Pending'}</span></td>
      <td style="font-size:12px">${[...new Set(d.filingDates)].join(', ')||'—'}</td>
      <td style="font-size:12px;font-family:'DM Mono',monospace">${[...new Set(d.acks)].join(', ')||'—'}</td>
      <td>${hasCorrn?'<span class="badge orange">Yes</span>':'<span class="badge grey">No</span>'}</td>
      <td><span class="badge ${scls}">${status}</span></td>
      <td style="font-size:11px;color:var(--orange);white-space:normal;max-width:200px">
        ${hasCorrn?'Correction: '+d.corrections.join(', '):''}
        ${!allFiled&&hasTDS&&!hasCorrn?'File before '+info.due:''}
      </td>
    </tr>`;
  });
  html+=`</tbody></table></div>`;
  document.getElementById('pane-returns').innerHTML=html;
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadData();
renderDashboard();

</script>
