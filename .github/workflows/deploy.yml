name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Create dist directory
        run: mkdir -p dist

      - name: Copy dashboard files
        run: |
          cp apps/dashboard/index.html dist/ || true
          cp apps/dashboard/admin.html dist/ || true
          cp apps/dashboard/api-client.js dist/ || true

      - name: Copy public assets
        run: cp -r public/* dist/ 2>/dev/null || true

      - name: Copy other apps
        run: |
          mkdir -p dist/invoice-generator dist/resume-builder dist/tds-manager
          cp -r apps/invoice-generator/frontend/* dist/invoice-generator/ 2>/dev/null || true
          cp -r apps/resume-builder/frontend/* dist/resume-builder/ 2>/dev/null || true
          cp -r apps/tds-manager/* dist/tds-manager/ 2>/dev/null || true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: mcharvtechlabs.com
